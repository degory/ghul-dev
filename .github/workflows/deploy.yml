name: Deploy site

on:
  push:
    branches:
      - main  # Set a branch to trigger deployment

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload dist folder
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: ./src/.vitepress/dist/

      - name: Disable Jekyll
        run: touch ./src/.vitepress/dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./src/.vitepress/dist/  # The folder generated by the build
          destination_dir: ./docs  # The folder GitHub Pages will use to serve the site
          enable_jekyll: false  # Disable Jekyll
          cname: ghul.dev
